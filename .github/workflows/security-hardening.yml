name: Security and Community Health
on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: '0 0 * * 1'

permissions:
  contents: read

jobs:
  secure-run:
    name: Security Hardening
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
      issues: write
      pull-requests: write
    
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@63c24ba6bd7ba022e95695ff85de572c04a18142 # v2.7.0
        with:
          egress-policy: audit 

      - name: Checkout Repository
        uses: actions/checkout@1d96c772d19495a3b5c517cd2bc0cb401ea0529f # v4.1.2

      - name: DCO Check
        uses: lcarva/dco-check@8943647f5d6a89c89420b925b6826649f87c95e1 # v3.2.0
        with:
          allow_merge_commits: true

      - name: Dependency Review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@5a1334812a6f272e276274ee7ed8dfa97576571a # v4.3.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@ccf741d46462706e22f2541335f49e0c679b37c0 # v3.25.1
        with:
          languages: javascript, python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@ccf741d46462706e22f2541335f49e0c679b37c0 # v3.25.1

      - name: Manage Stale Issues
        uses: actions/stale@11607bd369b617ce6c2854617da697be9ee7030e # v9.0.0
        with:
          stale-issue-message: 'This issue is stale because it has been open 60 days with no activity.'
          days-before-stale: 60
          days-before-close: 7
